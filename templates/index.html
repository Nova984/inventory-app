<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAI — Team Aviators International</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --accent:#3b82f6;
            --bg:#0a0e1a;
            --surface:#111827;
            --surface2:#1a2235;
            --border:rgba(255,255,255,0.07);
            --text:#e6edf3;
            --muted:#8b949e;
        }
        body {background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;margin:0;}
        .navbar {
            background:rgba(10,14,26,0.85);
            backdrop-filter:blur(14px);
            border-bottom:1px solid var(--border);
            padding:0.85rem 2rem;
        }
        .navbar-brand {color:#fff !important;font-weight:800;text-decoration:none;}
        .navbar-brand span {color:var(--accent);}
        .section {padding:4rem 0;}
        .inv-card {background:var(--surface2);border:1px solid var(--border);border-radius:14px;}
        .inv-table th {color:var(--muted);font-size:0.75rem;}
        .inv-table td {color:var(--text);}
        .btn-row-edit, .btn-row-del {
            padding:0.3rem 0.7rem;
            border-radius:6px;
            text-decoration:none;
            font-size:0.8rem;
        }
        .btn-row-edit {border:1px solid #ccc;color:#fff;}
        .btn-row-del {border:1px solid red;color:red;}
        .qty-badge {
            background:rgba(59,130,246,0.2);
            color:var(--accent);
            padding:4px 10px;
            border-radius:20px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-lg d-flex justify-content-between">
        <a href="/inventory" class="navbar-brand"><span>T</span>AI</a>
        <a href="/logout" class="btn btn-sm btn-danger">Logout</a>
    </div>
</nav>

<section class="section">
    <div class="container-lg">

        <h2 class="mb-4">Inventory</h2>

        <!-- Add form -->
        <form method="POST" action="/add" class="mb-4">
            <div class="row g-2">
                <div class="col-md-5">
                    <input type="text" name="name" class="form-control" placeholder="Item name" required>
                </div>
                <div class="col-md-3">
                    <input type="number" name="quantity" class="form-control" placeholder="Quantity" required>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100">Add</button>
                </div>
            </div>
        </form>

        <div class="inv-card p-3">
            {% if items %}
            <table class="table inv-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item['id'] }}</td>
                        <td>{{ item['name'] }}</td>
                        <td><span class="qty-badge">{{ item['quantity'] }}</span></td>
                        <td>
                            <a href="/update/{{ item['id'] }}" class="btn-row-edit">Edit</a>
                            <a href="/delete/{{ item['id'] }}" class="btn-row-del">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p>No items yet</p>
            {% endif %}
        </div>

    </div>
</section>

</body>
</html>
