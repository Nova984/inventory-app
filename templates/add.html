<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Equipment — TAI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --accent:#3b82f6;
            --bg:#0a0e1a;
            --surface:#111827;
            --border:rgba(255,255,255,0.08);
            --text:#e6edf3;
            --muted:#8b949e;
        }

        body {
            background:var(--bg);
            color:var(--text);
            font-family:'Segoe UI',system-ui,sans-serif;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        .navbar {
            background:rgba(10,14,26,0.9);
            backdrop-filter:blur(14px);
            border-bottom:1px solid var(--border);
            padding:0.85rem 2rem;
        }

        .navbar-brand {
            font-size:1.4rem;
            font-weight:900;
            color:#fff !important;
            text-decoration:none;
        }

        .navbar-brand span { color:var(--accent); }

        .page-wrap {
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:3rem 1rem;
        }

        .form-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:20px;
            padding:2.5rem;
            width:100%;
            max-width:420px;
        }

        .form-control {
            background:rgba(255,255,255,0.05);
            border:1px solid var(--border);
            color:var(--text);
        }

        .btn-submit {
            background:var(--accent);
            border:none;
            color:#fff;
            width:100%;
            padding:0.7rem;
            border-radius:10px;
        }

        .btn-back {
            display:block;
            text-align:center;
            margin-top:10px;
            border:1px solid var(--border);
            padding:0.6rem;
            border-radius:10px;
            color:var(--muted);
            text-decoration:none;
        }

        footer {
            text-align:center;
            padding:1rem;
            color:#3d4a5c;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/inventory" class="navbar-brand"><span>T</span>AI</a>
</nav>

<div class="page-wrap">
    <div class="form-card">

        <h2 class="mb-3">Add Item</h2>

        <form method="POST">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" name="quantity" class="form-control" required>
            </div>

            <button class="btn-submit">Add Item</button>
        </form>

        <a href="/inventory" class="btn-back">Back</a>

    </div>
</div>

<footer>Team Aviators International — 2026</footer>

</body>
</html>
